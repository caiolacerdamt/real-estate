<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Real Estate CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07080a;
      --panel: rgba(18, 20, 24, 0.86);
      --line: rgba(255, 255, 255, 0.08);
    }
    html { background: var(--bg); }
    body {
      font-family: "Manrope", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(20, 184, 166, 0.11), transparent 32rem),
        radial-gradient(circle at 80% 0%, rgba(245, 158, 11, 0.08), transparent 28rem),
        linear-gradient(180deg, #090a0d 0%, #07080a 46%, #050506 100%);
    }
    ::selection { background: rgba(45, 212, 191, 0.28); color: #f8fafc; }
    .app-shell {
      min-height: 100vh;
      background-image:
        linear-gradient(rgba(255,255,255,0.026) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 44px 44px;
    }
    .soft-panel {
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.32);
      backdrop-filter: blur(18px);
    }
    .field-dark {
      border: 1px solid rgba(255,255,255,0.09);
      background: rgba(8, 10, 13, 0.78);
      color: #f4f4f5;
      transition: border-color .18s ease, background .18s ease, box-shadow .18s ease;
    }
    .field-dark:focus {
      border-color: rgba(45, 212, 191, 0.65);
      box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.12);
      outline: none;
    }
    select.field-dark option {
      background: #101216;
      color: #f4f4f5;
    }
    .thin-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
    .thin-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,.14); border-radius: 999px; }
    .thin-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .line-clamp-3 {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .swot-item {
      display: block;
      max-width: 100%;
      overflow: hidden;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .swot-item-clamp {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
  </style>
</head>
<body class="min-h-screen bg-[#07080a] text-zinc-100 antialiased">
  <div id="app" class="min-h-screen"></div>

  <script>
    const API_URL = 'api.php';
    const STATUSES = ['Novo', 'Contatado', 'Respondeu', 'Em negociação'];
    const DEFAULT_COLUMN_LABELS = {
      'Novo': 'Novo',
      'Contatado': 'Contatado',
      'Respondeu': 'Respondeu',
      'Em negociação': 'Em negociação'
    };
    const TIER_OPTIONS = ['All', 'A+', 'A', 'B', 'C', 'D'];
    const PAGE_SIZE = 15;
    const app = document.getElementById('app');

    let leads = [];
    let filters = { search: '', tier: 'All', approach: 'All' };
    let columnLimits = {};
    let columnLabels = { ...DEFAULT_COLUMN_LABELS };
    let selectedLeadId = null;

    const escapeHtml = (value) => String(value || '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');

    const normalize = (value) => String(value || '').toLowerCase().trim();
    const getLead = (id) => leads.find((lead) => lead.Lead_ID === id);
    const uniqueApproaches = () => [...new Set(leads.map((lead) => lead.Approach_Type).filter(Boolean))].sort();
    const compactNumber = (value) => {
      const digits = String(value || '').replace(/[^\d.]/g, '');
      if (!digits) return value || '-';
      const number = Number(digits);
      if (!Number.isFinite(number)) return value || '-';
      return Intl.NumberFormat('en', { notation: 'compact', maximumFractionDigits: 1 }).format(number);
    };

    function tierClasses(tier) {
      if (tier === 'A+') return { border: 'border-l-teal-300', badge: 'bg-teal-300/10 text-teal-100 ring-teal-300/30', glow: 'shadow-[0_0_28px_rgba(45,212,191,.10)]' };
      if (tier === 'A') return { border: 'border-l-emerald-400', badge: 'bg-emerald-400/10 text-emerald-100 ring-emerald-300/25', glow: 'shadow-[0_0_24px_rgba(52,211,153,.08)]' };
      if (tier === 'B') return { border: 'border-l-amber-300', badge: 'bg-amber-300/10 text-amber-100 ring-amber-300/25', glow: 'shadow-[0_0_20px_rgba(251,191,36,.07)]' };
      if (tier === 'D') return { border: 'border-l-rose-400', badge: 'bg-rose-400/10 text-rose-100 ring-rose-300/25', glow: 'shadow-[0_0_20px_rgba(251,113,133,.07)]' };
      return { border: 'border-l-zinc-500', badge: 'bg-zinc-700/55 text-zinc-200 ring-white/10', glow: '' };
    }

    function statusAccent(status) {
      const colors = {
        'Novo': { dot: 'bg-sky-400', text: 'text-sky-200', ring: 'ring-sky-300/25', line: 'from-sky-400/70', border: 'border-l-sky-400' },
        'Contatado': { dot: 'bg-violet-400', text: 'text-violet-200', ring: 'ring-violet-300/25', line: 'from-violet-400/70', border: 'border-l-violet-400' },
        'Respondeu': { dot: 'bg-amber-300', text: 'text-amber-100', ring: 'ring-amber-300/25', line: 'from-amber-300/70', border: 'border-l-amber-300' },
        'Em negociação': { dot: 'bg-orange-400', text: 'text-orange-100', ring: 'ring-orange-300/25', line: 'from-orange-400/70', border: 'border-l-orange-400' }
      };
      return colors[status] || { dot: 'bg-zinc-400', text: 'text-zinc-300', ring: 'ring-white/10', line: 'from-zinc-400/60', border: 'border-l-zinc-400' };
    }

    async function saveColumnLabels() {
      const response = await fetch(`${API_URL}?action=update_column_labels`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ column_labels: columnLabels })
      });
      const data = await response.json();
      if (!data.success) throw new Error(data.error || 'Erro ao salvar nomes das colunas');
      columnLabels = { ...DEFAULT_COLUMN_LABELS, ...(data.column_labels || {}) };
      return columnLabels;
    }

    function statusLabel(status) {
      return columnLabels[status] || status;
    }

    function activityDot(activity) {
      const value = normalize(activity);
      if (value === 'high' || value === 'yes') return 'bg-teal-300';
      if (value === 'medium') return 'bg-amber-300';
      if (value === 'low' || value === 'no') return 'bg-rose-400';
      return 'bg-zinc-500';
    }

    function resetColumnLimits() {
      columnLimits = {};
      STATUSES.forEach((status) => {
        columnLimits[status] = PAGE_SIZE;
      });
    }

    function getColumnLimit(status) {
      if (!columnLimits[status]) columnLimits[status] = PAGE_SIZE;
      return columnLimits[status];
    }

    function filteredLeads() {
      return leads.filter((lead) => {
        const matchesName = normalize(lead.Name).includes(normalize(filters.search));
        const matchesTier = filters.tier === 'All' || lead.New_Tier === filters.tier;
        const matchesApproach = filters.approach === 'All' || lead.Approach_Type === filters.approach;
        return matchesName && matchesTier && matchesApproach;
      });
    }

    function renderFilterDropdown(filterKey, label, value, options) {
      const current = options.find((option) => option.value === value) || options[0];
      return `
        <div class="relative" data-filter-dropdown>
          <button type="button" data-filter-toggle="${escapeHtml(filterKey)}" aria-expanded="false" class="field-dark flex w-full items-center justify-between gap-3 rounded-xl px-3.5 py-2.5 text-left text-sm font-semibold">
            <span class="truncate">${escapeHtml(label)}: ${escapeHtml(current.label)}</span>
            <span class="text-xs text-zinc-500">v</span>
          </button>
          <div data-filter-menu class="hidden absolute left-0 right-0 top-full z-40 mt-2 overflow-hidden rounded-xl border border-white/[0.09] bg-[#101216] p-1 shadow-[0_22px_60px_rgba(0,0,0,.45)]">
            ${options.map((option) => `
              <button type="button" data-filter-option data-filter-key="${escapeHtml(filterKey)}" data-filter-value="${escapeHtml(option.value)}" class="flex w-full items-center justify-between rounded-lg px-3 py-2 text-left text-sm font-semibold transition ${option.value === value ? 'bg-teal-300/10 text-teal-100' : 'text-zinc-300 hover:bg-white/[0.06] hover:text-zinc-50'}">
                <span>${escapeHtml(option.label)}</span>
                ${option.value === value ? '<span class="h-1.5 w-1.5 rounded-full bg-teal-300"></span>' : ''}
              </button>
            `).join('')}
          </div>
        </div>
      `;
    }

    function closeFilterDropdowns(exceptMenu = null) {
      document.querySelectorAll('[data-filter-menu]').forEach((menu) => {
        if (menu === exceptMenu) return;
        menu.classList.add('hidden');
        menu.parentElement?.querySelector('[data-filter-toggle]')?.setAttribute('aria-expanded', 'false');
      });
    }

    function renderStatusDropdown(value) {
      const currentLabel = statusLabel(value);
      return `
        <div class="relative mt-2 normal-case tracking-normal" data-status-dropdown>
          <input id="status-input" type="hidden" value="${escapeHtml(value)}">
          <button type="button" data-status-toggle aria-expanded="false" class="field-dark flex w-full items-center justify-between gap-3 rounded-xl px-3.5 py-2.5 text-left text-sm font-semibold">
            <span class="truncate">${escapeHtml(currentLabel)}</span>
            <span class="text-xs text-zinc-500">v</span>
          </button>
          <div data-status-menu class="hidden absolute left-0 right-0 top-full z-50 mt-2 overflow-hidden rounded-xl border border-white/[0.09] bg-[#101216] p-1 shadow-[0_22px_60px_rgba(0,0,0,.45)]">
            ${STATUSES.map((status) => {
              const accent = statusAccent(status);
              const selected = status === value;
              return `
                <button type="button" data-status-option="${escapeHtml(status)}" class="flex w-full items-center justify-between gap-3 rounded-lg px-3 py-2 text-left text-sm font-semibold transition ${selected ? 'bg-teal-300/10 text-teal-100' : 'text-zinc-300 hover:bg-white/[0.06] hover:text-zinc-50'}">
                  <span class="flex min-w-0 items-center gap-2">
                    <span class="h-2 w-2 shrink-0 rounded-full ${accent.dot}"></span>
                    <span class="truncate">${escapeHtml(statusLabel(status))}</span>
                  </span>
                  ${selected ? '<span class="h-1.5 w-1.5 rounded-full bg-teal-300"></span>' : ''}
                </button>
              `;
            }).join('')}
          </div>
        </div>
      `;
    }

    async function loadLeads() {
      app.innerHTML = `<div class="app-shell flex min-h-screen items-center justify-center text-sm font-medium text-zinc-500">Carregando leads...</div>`;

      try {
        const response = await fetch(`${API_URL}?action=get_leads`);
        const data = await response.json();
        if (!data.success) throw new Error(data.error || 'Erro ao carregar leads');

        leads = Array.isArray(data.leads) ? data.leads : [];
        columnLabels = { ...DEFAULT_COLUMN_LABELS, ...(data.column_labels || {}) };
        resetColumnLimits();
        if (leads.length === 0) {
          renderImportScreen();
        } else {
          renderCRM();
        }
      } catch (error) {
        app.innerHTML = `<div class="app-shell mx-auto flex min-h-screen max-w-xl items-center justify-center p-6">
          <div class="soft-panel rounded-xl p-5 text-sm text-rose-200">${escapeHtml(error.message)}</div>
        </div>`;
      }
    }

    function renderImportScreen(message = '') {
      app.innerHTML = `
        <main class="app-shell flex min-h-screen items-center justify-center px-4 py-10">
          <section class="soft-panel w-full max-w-xl rounded-2xl p-8">
            <div class="mb-7">
              <p class="mb-3 text-xs font-bold uppercase tracking-[0.28em] text-teal-200/80">Real Estate CRM</p>
              <h1 class="text-2xl font-semibold tracking-tight text-zinc-50">Nenhum lead importado ainda</h1>
              <p class="mt-2 text-sm leading-6 text-zinc-400">Importe o CSV para montar o board de leads e iniciar a triagem.</p>
            </div>
            <form id="import-form" class="space-y-5">
              <input id="csv-file" name="csv" type="file" accept=".csv,text/csv" class="block w-full rounded-xl field-dark px-3 py-2 text-sm file:mr-4 file:rounded-lg file:border-0 file:bg-zinc-100 file:px-4 file:py-2 file:text-sm file:font-semibold file:text-zinc-950">
              <button type="submit" class="w-full rounded-xl bg-teal-300 px-4 py-2.5 text-sm font-bold text-zinc-950 transition hover:bg-teal-200">Importar CSV</button>
            </form>
            <p class="mt-5 text-sm leading-6 text-zinc-500">Formato esperado: CSV com headers na primeira linha, separador virgula.</p>
            <p id="import-message" class="mt-4 text-sm text-zinc-400">${escapeHtml(message)}</p>
          </section>
        </main>
      `;
      bindImportForm(document.getElementById('import-form'), document.getElementById('import-message'));
    }

    function renderCRM(options = {}) {
      const approaches = uniqueApproaches();
      const visibleLeads = filteredLeads();
      const tierDropdownOptions = TIER_OPTIONS.map((tier) => ({ value: tier, label: tier === 'All' ? 'All' : tier }));
      const approachDropdownOptions = [
        { value: 'All', label: 'All' },
        ...approaches.map((approach) => ({ value: approach, label: approach }))
      ];
      const shouldRestoreSearchFocus = options.restoreSearchFocus || document.activeElement?.id === 'search-filter';
      const searchCursor = document.getElementById('search-filter')?.selectionStart ?? filters.search.length;

      app.innerHTML = `
        <div class="app-shell min-h-screen">
          <header class="sticky top-0 z-30 border-b border-white/[0.07] bg-[#07080a]/80 px-4 py-4 backdrop-blur-xl">
            <div class="mx-auto flex max-w-[1760px] flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
              <div>
                <p class="text-[11px] font-bold uppercase tracking-[0.28em] text-teal-200/70">Pipeline</p>
                <h1 class="mt-1 text-xl font-semibold tracking-tight text-zinc-50">Real Estate CRM</h1>
              </div>
              <div class="flex flex-col gap-3 sm:flex-row sm:items-center">
                <button id="open-import" class="rounded-xl border border-white/10 bg-white/[0.04] px-4 py-2 text-sm font-semibold text-zinc-100 transition hover:border-teal-300/40 hover:bg-teal-300/10">Importar CSV</button>
                <div class="rounded-xl border border-white/10 bg-white/[0.04] px-4 py-2 text-sm text-zinc-400">Leads visiveis <span class="ml-2 font-bold text-zinc-50">${visibleLeads.length}</span></div>
              </div>
            </div>
          </header>

          <section class="border-b border-white/[0.06] px-4 py-4">
            <div class="mx-auto grid max-w-[1760px] gap-3 md:grid-cols-[minmax(260px,1fr)_160px_240px_auto]">
              <input id="search-filter" type="search" placeholder="Buscar por nome" value="${escapeHtml(filters.search)}" class="field-dark rounded-xl px-3.5 py-2.5 text-sm">
              ${renderFilterDropdown('tier', 'Tier', filters.tier, tierDropdownOptions)}
              ${renderFilterDropdown('approach', 'Approach', filters.approach, approachDropdownOptions)}
              <button id="clear-filters" class="rounded-xl border border-white/10 bg-white/[0.04] px-4 py-2.5 text-sm font-semibold text-zinc-200 transition hover:bg-white/[0.08]">Limpar</button>
            </div>
          </section>

          <main class="thin-scrollbar overflow-x-auto px-4 py-5">
            <div class="mx-auto flex w-max max-w-[1760px] justify-center gap-4 pb-4 xl:w-full">
              ${STATUSES.map((status) => renderColumn(status, visibleLeads.filter((lead) => (lead.Status || 'Novo') === status))).join('')}
            </div>
          </main>
        </div>
        <div id="modal-root"></div>
        <div id="import-root"></div>
      `;

      bindFilters();
      document.getElementById('open-import').addEventListener('click', renderImportModal);

      if (shouldRestoreSearchFocus) {
        const searchInput = document.getElementById('search-filter');
        searchInput.focus();
        searchInput.setSelectionRange(searchCursor, searchCursor);
      }
    }

    function renderColumn(status, columnLeads) {
      const limit = getColumnLimit(status);
      const visibleColumnLeads = columnLeads.slice(0, limit);
      const hasMore = columnLeads.length > visibleColumnLeads.length;
      const accent = statusAccent(status);
      const label = columnLabels[status] || status;

      return `
        <section class="flex h-[calc(100vh-190px)] min-w-[350px] flex-1 flex-col overflow-hidden rounded-2xl border border-white/[0.07] bg-zinc-950/70 shadow-[0_18px_60px_rgba(0,0,0,.22)] backdrop-blur xl:min-w-0">
          <div class="relative flex items-center justify-between border-b border-white/[0.07] px-4 py-3.5">
            <div class="absolute inset-x-0 top-0 h-px bg-gradient-to-r ${accent.line} via-white/10 to-transparent"></div>
            <div class="flex min-w-0 items-center gap-2">
              <span class="h-2.5 w-2.5 shrink-0 rounded-full ${accent.dot} shadow-[0_0_14px_currentColor]"></span>
              <input data-column-label="${escapeHtml(status)}" value="${escapeHtml(label)}" class="column-label min-w-0 flex-1 truncate rounded-lg border border-transparent bg-transparent px-1 py-0.5 text-sm font-bold ${accent.text} outline-none transition hover:border-white/10 focus:border-white/15 focus:bg-white/[0.04]">
            </div>
            <span class="rounded-full border border-white/10 bg-white/[0.05] px-2.5 py-1 text-xs font-bold text-zinc-300">${columnLeads.length}</span>
          </div>
          <div class="thin-scrollbar space-y-3 overflow-y-auto p-3">
            ${visibleColumnLeads.map((lead) => renderLeadCard(lead, status)).join('') || '<p class="px-2 py-4 text-sm text-zinc-500">Sem leads</p>'}
            ${hasMore ? `<button type="button" data-load-more="${escapeHtml(status)}" class="load-more w-full rounded-xl border border-white/10 px-3 py-2 text-sm font-semibold text-zinc-300 transition hover:bg-white/[0.06]">Carregar mais</button>` : ''}
          </div>
        </section>
      `;
    }

    function splitShortNote(note) {
      const parts = String(note || '').split('||');
      const positives = splitNoteItems(parts[0]);
      const negatives = splitNoteItems(parts.slice(1).join('||'));
      return { positives, negatives };
    }

    function splitNoteItems(value) {
      return String(value || '')
        .split('|')
        .map((item) => item.trim())
        .filter(Boolean);
    }

    function normalizeSocialUrl(type, value) {
      const rawValue = String(value || '').trim();
      if (!rawValue) return '';

      if (/^https?:\/\//i.test(rawValue)) return rawValue;

      if (type === 'instagram') {
        const handle = rawValue
          .replace(/^@/, '')
          .replace(/^instagram\.com\//i, '')
          .replace(/^www\.instagram\.com\//i, '')
          .replace(/^\/+/, '')
          .split(/[/?#]/)[0];
        return handle ? `https://www.instagram.com/${handle}` : '';
      }

      if (type === 'linkedin') {
        if (/^(www\.)?linkedin\.com\//i.test(rawValue)) return `https://${rawValue}`;
        const handle = rawValue.replace(/^@/, '').replace(/^\/+/, '');
        return handle ? `https://www.linkedin.com/in/${handle}` : '';
      }

      return rawValue;
    }

    function renderCardLink(label, url, type) {
      const href = normalizeSocialUrl(type, url);
      if (!href) {
        return `<span class="rounded-full border border-white/[0.06] px-2 py-1 text-[11px] font-bold text-zinc-600">${label}</span>`;
      }

      return `<a href="${escapeHtml(href)}" target="_blank" rel="noopener noreferrer" class="card-link rounded-full border border-white/10 bg-white/[0.04] px-2 py-1 text-[11px] font-bold text-zinc-300 transition hover:border-teal-300/40 hover:text-teal-100">${label}</a>`;
    }

    function renderSwotList(items, emptyText) {
      const visibleItems = items.slice(0, 3);
      if (!visibleItems.length) {
        return `<p class="text-xs leading-4 text-zinc-600">${emptyText}</p>`;
      }

      return visibleItems.map((item) => `<p class="swot-item swot-item-clamp text-xs leading-4 text-zinc-400" title="${escapeHtml(item)}">${escapeHtml(item)}</p>`).join('');
    }

    function renderLeadCard(lead, status) {
      const tier = lead.New_Tier || lead.Tier_Fase1 || 'C';
      const classes = tierClasses(tier);
      const accent = statusAccent(status);
      const dot = activityDot(lead.IG_Activity);
      const swot = splitShortNote(lead.Short_Note);
      const score = lead.Score_Fase1 || lead.Brand_Score || '-';
      const liAudience = lead.LI_Followers || lead.LI_Connections || '-';

      return `
        <article data-lead-id="${escapeHtml(lead.Lead_ID)}" tabindex="0" class="lead-card group w-full cursor-pointer rounded-2xl border border-white/[0.08] ${accent.border} ${classes.glow} border-l-4 bg-[#101216]/92 p-4 text-left shadow-sm transition duration-200 hover:-translate-y-0.5 hover:border-white/[0.16] hover:bg-[#14171d] focus:outline-none focus:ring-2 focus:ring-teal-200/35">
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0">
              <h3 class="truncate text-sm font-bold tracking-[-0.01em] text-zinc-50">${escapeHtml(lead.Name)}</h3>
              <p class="mt-1 truncate text-xs font-medium text-zinc-500">${escapeHtml(lead.Type)} - ${escapeHtml(lead.Gender)}</p>
            </div>
            <span class="shrink-0 rounded-full px-2.5 py-1 text-[11px] font-extrabold ring-1 ${classes.badge}">${escapeHtml(tier)}</span>
          </div>
          <div class="mt-4 grid grid-cols-3 gap-2">
            <div class="rounded-xl border border-white/[0.07] bg-white/[0.035] px-2.5 py-2">
              <p class="text-[10px] font-bold uppercase tracking-[0.18em] text-zinc-600">Score</p>
              <p class="mt-0.5 text-sm font-bold text-zinc-100">${escapeHtml(score)}</p>
            </div>
            <div class="rounded-xl border border-white/[0.07] bg-white/[0.035] px-2.5 py-2">
              <p class="text-[10px] font-bold uppercase tracking-[0.18em] text-zinc-600">Brand</p>
              <p class="mt-0.5 text-sm font-bold text-zinc-100">${escapeHtml(lead.Brand_Score || '-')}</p>
            </div>
            <div class="rounded-xl border border-white/[0.07] bg-white/[0.035] px-2.5 py-2">
              <p class="text-[10px] font-bold uppercase tracking-[0.18em] text-zinc-600">IG</p>
              <p class="mt-0.5 text-sm font-bold text-zinc-100">${escapeHtml(compactNumber(lead.IG_Followers))}</p>
            </div>
          </div>
          <div class="mt-3">
            <p class="line-clamp-2 text-sm font-semibold leading-5 text-zinc-200">${escapeHtml(lead.Recommended_Angle || '-')}</p>
            <p class="mt-1 truncate text-xs text-zinc-500">Approach: <span class="font-semibold text-zinc-300">${escapeHtml(lead.Approach_Type || '-')}</span></p>
          </div>
          <div class="mt-2 flex flex-wrap gap-2">
            ${renderCardLink('Instagram', lead.Instagram, 'instagram')}
            ${renderCardLink('LinkedIn', lead.Linkedin, 'linkedin')}
          </div>
          <div class="mt-3 grid gap-1 text-xs leading-5 text-zinc-500">
            <p class="truncate">IG <span class="font-semibold text-zinc-300">${escapeHtml(compactNumber(lead.IG_Followers))}</span> - <span class="font-semibold text-zinc-300">${escapeHtml(lead.IG_Posts_30d || '-')}</span> posts/30d</p>
            <p class="truncate">LI <span class="font-semibold text-zinc-300">${escapeHtml(compactNumber(liAudience))}</span> - <span class="font-semibold text-zinc-300">${escapeHtml(lead.LI_Company || '-')}</span></p>
          </div>
          <p class="mt-2 flex items-center gap-2 text-xs font-semibold text-zinc-400"><span class="h-2 w-2 rounded-full ${dot}"></span>IG Activity: ${escapeHtml(lead.IG_Activity || '-')}</p>
          <div class="mt-3 min-w-0 overflow-hidden border-t border-white/[0.07] pt-3">
            <p class="mb-1 text-[10px] font-bold uppercase tracking-[0.2em] text-zinc-600">Observacao</p>
            <p class="swot-item swot-item-clamp text-xs leading-4 text-zinc-400" title="${escapeHtml(lead.Observação || '')}">${escapeHtml(lead.Observação || 'Sem observacao.')}</p>
          </div>
          <div class="mt-3 grid min-w-0 gap-2 overflow-hidden border-t border-white/[0.07] pt-3">
            <div class="min-w-0 overflow-hidden">
              <p class="mb-1 text-[10px] font-bold uppercase tracking-[0.2em] text-teal-300/70">Positivos</p>
              ${renderSwotList(swot.positives, 'Sem pontos positivos no Short_Note.')}
            </div>
            <div class="min-w-0 overflow-hidden">
              <p class="mb-1 text-[10px] font-bold uppercase tracking-[0.2em] text-rose-300/70">Negativos</p>
              ${renderSwotList(swot.negatives, 'Sem pontos negativos no Short_Note.')}
            </div>
          </div>
        </article>
      `;
    }

    function bindFilters() {
      document.querySelectorAll('.lead-card').forEach((card) => {
        card.addEventListener('click', () => openLeadModal(card.dataset.leadId));
        card.addEventListener('keydown', (event) => {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            openLeadModal(card.dataset.leadId);
          }
        });
      });

      document.querySelectorAll('.card-link').forEach((link) => {
        link.addEventListener('click', (event) => event.stopPropagation());
      });

      document.querySelectorAll('.column-label').forEach((input) => {
        input.addEventListener('click', (event) => event.stopPropagation());
        input.addEventListener('input', (event) => {
          const status = event.target.dataset.columnLabel;
          columnLabels[status] = event.target.value || DEFAULT_COLUMN_LABELS[status] || status;
        });
        input.addEventListener('keydown', (event) => {
          if (event.key === 'Enter') {
            event.preventDefault();
            event.target.blur();
          }
        });
        input.addEventListener('blur', async (event) => {
          const status = event.target.dataset.columnLabel;
          if (!event.target.value.trim()) {
            columnLabels[status] = DEFAULT_COLUMN_LABELS[status] || status;
            event.target.value = columnLabels[status];
          }
          try {
            await saveColumnLabels();
          } catch (error) {
            event.target.title = error.message;
          }
        });
      });

      document.querySelectorAll('.load-more').forEach((button) => {
        button.addEventListener('click', () => {
          const status = button.dataset.loadMore;
          columnLimits[status] = getColumnLimit(status) + PAGE_SIZE;
          renderCRM();
        });
      });

      document.getElementById('search-filter').addEventListener('input', (event) => {
        filters.search = event.target.value;
        resetColumnLimits();
        renderCRM({ restoreSearchFocus: true });
      });

      document.querySelectorAll('[data-filter-toggle]').forEach((button) => {
        button.addEventListener('click', (event) => {
          event.stopPropagation();
          const menu = button.parentElement.querySelector('[data-filter-menu]');
          const shouldOpen = menu.classList.contains('hidden');
          closeFilterDropdowns(menu);
          menu.classList.toggle('hidden', !shouldOpen);
          button.setAttribute('aria-expanded', String(shouldOpen));
          if (shouldOpen) {
            setTimeout(() => document.addEventListener('click', () => closeFilterDropdowns(), { once: true }), 0);
          }
        });
      });

      document.querySelectorAll('[data-filter-option]').forEach((button) => {
        button.addEventListener('click', (event) => {
          event.stopPropagation();
          filters[button.dataset.filterKey] = button.dataset.filterValue;
          resetColumnLimits();
          renderCRM();
        });
      });

      document.getElementById('clear-filters').addEventListener('click', () => {
        filters = { search: '', tier: 'All', approach: 'All' };
        resetColumnLimits();
        renderCRM();
      });
    }

    function openLeadModal(leadId) {
      selectedLeadId = leadId;
      const lead = getLead(leadId);
      if (!lead) return;

      const root = document.getElementById('modal-root');
      root.innerHTML = `
        <div class="fixed inset-0 z-40 overflow-y-auto bg-black/72 p-4 backdrop-blur-md">
          <div class="mx-auto my-6 max-w-5xl overflow-hidden rounded-2xl border border-white/[0.09] bg-[#0d0f13] shadow-[0_30px_100px_rgba(0,0,0,.55)]">
            <div class="flex items-start justify-between gap-4 border-b border-white/[0.07] bg-white/[0.025] p-6">
              <div>
                <h2 class="text-2xl font-semibold tracking-tight text-zinc-50">${escapeHtml(lead.Name)}</h2>
                <p class="mt-1 text-sm text-zinc-500">${escapeHtml(lead.Type)} - ${escapeHtml(lead.Gender)} - New Tier: ${escapeHtml(lead.New_Tier)}</p>
              </div>
              <button id="close-modal" class="rounded-xl border border-white/10 bg-white/[0.04] px-3 py-1.5 text-sm font-semibold text-zinc-200 transition hover:bg-white/[0.08]">Fechar</button>
            </div>

            <div class="border-b border-white/[0.07] p-6">
              <div class="flex flex-col gap-3 sm:flex-row sm:items-end">
                <label class="flex-1 text-xs font-bold uppercase tracking-[0.2em] text-zinc-500">Status
                  ${renderStatusDropdown(lead.Status || 'Novo')}
                </label>
                <button data-save-field="Status" class="rounded-xl bg-teal-300 px-4 py-2.5 text-sm font-bold text-zinc-950 transition hover:bg-teal-200">Salvar</button>
              </div>
            </div>

            <div class="grid gap-0 border-b border-white/[0.07] md:grid-cols-2">
              <section class="border-b border-white/[0.07] p-6 md:border-b-0 md:border-r md:border-white/[0.07]">
                <h3 class="mb-3 text-xs font-bold uppercase tracking-[0.2em] text-zinc-500">Contato</h3>
                ${contactLine('Phone', lead.Phone)}
                ${contactLine('Email', lead.Email)}
                ${linkLine('Website', lead.Website, lead.Website)}
              </section>
              <section class="p-6">
                <h3 class="mb-3 text-xs font-bold uppercase tracking-[0.2em] text-zinc-500">Redes sociais</h3>
                ${linkLine('Instagram', normalizeSocialUrl('instagram', lead.Instagram), `${lead.Instagram || ''} (${lead.IG_Followers || ''})`)}
                <p class="mt-2 text-sm text-zinc-400">Posts/30d: ${escapeHtml(lead.IG_Posts_30d)} | Activity: ${escapeHtml(lead.IG_Activity)}</p>
                <div class="my-4 border-t border-white/[0.07]"></div>
                ${linkLine('LinkedIn', normalizeSocialUrl('linkedin', lead.Linkedin), `${lead.LI_Followers || ''} followers`)}
                <p class="mt-2 text-sm text-zinc-400">${escapeHtml(lead.LI_Company)} | ${escapeHtml(lead.LI_Headline)}</p>
              </section>
            </div>

            <section class="border-b border-white/[0.07] p-6">
              <h3 class="mb-3 text-xs font-bold uppercase tracking-[0.2em] text-zinc-500">Qualificacao</h3>
              <div class="space-y-2 text-sm leading-6 text-zinc-300">
                <p>Score Fase1: ${escapeHtml(lead.Score_Fase1)} | Tier Fase1: ${escapeHtml(lead.Tier_Fase1)} | Brand Score: ${escapeHtml(lead.Brand_Score)}</p>
                <p>Angle: ${escapeHtml(lead.Recommended_Angle)}</p>
                <p>Approach: ${escapeHtml(lead.Approach_Type)}</p>
                <p>Website: ${escapeHtml(lead.Website)} (match: ${escapeHtml(lead.Website_Match)})</p>
                <p>Website Summary: ${escapeHtml(lead.Website_Summary)}</p>
              </div>
            </section>

            <section class="border-b border-white/[0.07] p-6">
              <div class="mb-3 flex items-center justify-between">
                <h3 class="text-xs font-bold uppercase tracking-[0.2em] text-zinc-500">Primeira mensagem</h3>
                <button id="copy-message" class="rounded-xl border border-white/10 bg-white/[0.04] px-3 py-1.5 text-sm font-semibold text-zinc-200 transition hover:bg-white/[0.08]">Copiar</button>
              </div>
              <div class="rounded-2xl border border-white/[0.07] bg-white/[0.03] p-4 text-sm leading-6 text-zinc-200">${escapeHtml(lead.First_Message)}</div>
            </section>

            <section class="border-b border-white/[0.07] p-6">
              <div class="mb-3 flex items-center justify-between gap-3">
                <h3 class="text-xs font-bold uppercase tracking-[0.2em] text-zinc-500">Observacao</h3>
                <button data-save-field="Observação" class="rounded-xl bg-teal-300 px-4 py-2 text-sm font-bold text-zinc-950 transition hover:bg-teal-200">Salvar</button>
              </div>
              <textarea id="observacao-input" rows="4" class="field-dark w-full rounded-xl px-3 py-2 text-sm">${escapeHtml(lead.Observação)}</textarea>
            </section>

            <section class="p-6">
              <div class="mb-3 flex items-center justify-between gap-3">
                <h3 class="text-xs font-bold uppercase tracking-[0.2em] text-zinc-500">Notas internas</h3>
                <button data-save-field="Internal_Notes" class="rounded-xl bg-teal-300 px-4 py-2 text-sm font-bold text-zinc-950 transition hover:bg-teal-200">Salvar</button>
              </div>
              <textarea id="notes-input" rows="4" class="field-dark w-full rounded-xl px-3 py-2 text-sm">${escapeHtml(lead.Internal_Notes)}</textarea>
              <p id="modal-message" class="mt-3 text-sm text-zinc-400"></p>
            </section>
          </div>
        </div>
      `;

      document.getElementById('close-modal').addEventListener('click', closeModal);
      document.querySelectorAll('[data-save-field]').forEach((button) => button.addEventListener('click', () => saveField(button.dataset.saveField)));
      document.getElementById('copy-message').addEventListener('click', copyFirstMessage);
      const statusToggle = document.querySelector('[data-status-toggle]');
      const statusMenu = document.querySelector('[data-status-menu]');
      statusToggle.addEventListener('click', (event) => {
        event.stopPropagation();
        const shouldOpen = statusMenu.classList.contains('hidden');
        statusMenu.classList.toggle('hidden', !shouldOpen);
        statusToggle.setAttribute('aria-expanded', String(shouldOpen));
        if (shouldOpen) {
          setTimeout(() => document.addEventListener('click', () => {
            statusMenu.classList.add('hidden');
            statusToggle.setAttribute('aria-expanded', 'false');
          }, { once: true }), 0);
        }
      });
      document.querySelectorAll('[data-status-option]').forEach((button) => {
        button.addEventListener('click', (event) => {
          event.stopPropagation();
          document.getElementById('status-input').value = button.dataset.statusOption;
          statusMenu.classList.add('hidden');
          statusToggle.setAttribute('aria-expanded', 'false');
          const label = statusToggle.querySelector('span');
          label.textContent = statusLabel(button.dataset.statusOption);
        });
      });
    }

    function contactLine(icon, text) {
      return `<p class="mt-2 break-words text-sm text-zinc-300">${icon} ${escapeHtml(text)}</p>`;
    }

    function linkLine(label, url, text) {
      if (!url) return `<p class="mt-2 text-sm text-zinc-600">${escapeHtml(label)}: -</p>`;
      return `<p class="mt-2 break-words text-sm text-zinc-300">${escapeHtml(label)}: <a class="font-semibold text-teal-200 underline decoration-teal-500/35 underline-offset-4 hover:text-teal-100" href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(text || url)}</a></p>`;
    }

    function closeModal() {
      selectedLeadId = null;
      document.getElementById('modal-root').innerHTML = '';
    }

    async function saveField(field) {
      const lead = getLead(selectedLeadId);
      if (!lead) return;

      const payload = { Lead_ID: lead.Lead_ID };
      if (field === 'Status') payload.Status = document.getElementById('status-input').value;
      if (field === 'Observação') payload.Observação = document.getElementById('observacao-input').value;
      if (field === 'Internal_Notes') payload.Internal_Notes = document.getElementById('notes-input').value;

      const message = document.getElementById('modal-message');
      message.textContent = 'Salvando...';

      try {
        const response = await fetch(`${API_URL}?action=update_lead`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await response.json();
        if (!data.success) throw new Error(data.error || 'Erro ao salvar');

        Object.assign(lead, payload);
        message.textContent = 'Salvo.';
        renderCRM();
        openLeadModal(lead.Lead_ID);
      } catch (error) {
        message.textContent = error.message;
      }
    }

    async function copyFirstMessage() {
      const lead = getLead(selectedLeadId);
      if (!lead) return;

      await navigator.clipboard.writeText(lead.First_Message || '');
      const message = document.getElementById('modal-message');
      message.textContent = 'Copiado.';
    }

    function renderImportModal() {
      const root = document.getElementById('import-root');
      root.innerHTML = `
        <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/72 p-4 backdrop-blur-md">
          <section class="soft-panel w-full max-w-lg rounded-2xl p-6">
            <div class="mb-5 flex items-center justify-between">
              <h2 class="text-lg font-semibold text-zinc-50">Importar CSV</h2>
              <button id="close-import" class="rounded-xl border border-white/10 bg-white/[0.04] px-3 py-1.5 text-sm font-semibold text-zinc-200 transition hover:bg-white/[0.08]">Fechar</button>
            </div>
            <form id="import-form" class="space-y-5">
              <input id="csv-file" name="csv" type="file" accept=".csv,text/csv" class="block w-full rounded-xl field-dark px-3 py-2 text-sm file:mr-4 file:rounded-lg file:border-0 file:bg-zinc-100 file:px-4 file:py-2 file:text-sm file:font-semibold file:text-zinc-950">
              <button type="submit" class="w-full rounded-xl bg-teal-300 px-4 py-2.5 text-sm font-bold text-zinc-950 transition hover:bg-teal-200">Importar CSV</button>
            </form>
            <p class="mt-5 text-sm leading-6 text-zinc-500">Formato esperado: CSV com headers na primeira linha, separador virgula.</p>
            <p id="import-message" class="mt-4 text-sm text-zinc-400"></p>
          </section>
        </div>
      `;
      document.getElementById('close-import').addEventListener('click', () => root.innerHTML = '');
      bindImportForm(document.getElementById('import-form'), document.getElementById('import-message'));
    }

    function bindImportForm(form, messageEl) {
      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        const fileInput = form.querySelector('input[type="file"]');
        if (!fileInput.files.length) {
          messageEl.textContent = 'Selecione um CSV.';
          return;
        }

        const formData = new FormData();
        formData.append('csv', fileInput.files[0]);
        messageEl.textContent = 'Importando...';

        try {
          const response = await fetch(`${API_URL}?action=import`, { method: 'POST', body: formData });
          const data = await response.json();
          if (!data.success) throw new Error(data.error || 'Erro no import');
          messageEl.textContent = `Importado: ${data.imported} leads (${data.new} novos, ${data.updated} atualizados). Recarregando em 5s...`;
          setTimeout(() => window.location.reload(), 5000);
        } catch (error) {
          messageEl.textContent = error.message;
        }
      });
    }

    loadLeads();
  </script>
</body>
